<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026科室任务监控系统</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #F5F5F7; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5E5EA; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // ---------------------------------------------------------
        // ⚠️ 核心配置区：请将下面 firebaseConfig 的值替换为您自己的配置
        // ---------------------------------------------------------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpJRO-ReMTkHpz3qd8gCAXZIRnajzvjRg",
            authDomain: "task-f01f9.firebaseapp.com",
            databaseURL: "https://task-f01f9-default-rtdb.firebaseio.com",
            projectId: "task-f01f9",
            storageBucket: "task-f01f9.firebasestorage.app",
            messagingSenderId: "1089336817558",
            appId: "1:1089336817558:web:9f253f691a777cac398fb7",
            measurementId: "G-DD8CM1JTB7"
        };

        const isConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "你的API_KEY";

        try {
            if (isConfigured) {
                const app = initializeApp(firebaseConfig);
                window.db = getFirestore(app);
                window.isFirebaseReady = true;
            } else {
                window.isFirebaseReady = false;
            }
        } catch (e) {
            console.error("Firebase 初始化失败:", e);
            window.isFirebaseReady = false;
        }

        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.setDoc = setDoc;
        window.appId = "taskflow-2026-v1";
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 内置原生 SVG 图标组件，彻底消除对外部 CDN 图标库的依赖，避免加载失败 ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const ListTodo = (props) => <IconBase {...props}><path d="M14 14h6"/><path d="M14 19h6"/><path d="M14 9h6"/><path d="M9 14h.01"/><path d="M9 19h.01"/><path d="M9 9h.01"/><path d="M3 5h18"/><path d="M3 5v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5"/></IconBase>;
        const Cloud = (props) => <IconBase {...props}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></IconBase>;
        const CloudOff = (props) => <IconBase {...props}><path d="M22.61 16.95A4.5 4.5 0 0 0 17.5 10h-1.79A7 7 0 0 0 9 3.04"/><path d="M5 5a7 7 0 0 0 10.74 9.36"/><path d="M17.5 19H9a7 7 0 0 1-2.61-.51"/><line x1="2" x2="22" y1="2" y2="22"/></IconBase>;
        const Filter = (props) => <IconBase {...props}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>;
        const Calendar = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconBase>;
        const CheckCircle2 = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
        const Circle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/></IconBase>;
        const PieChartIcon = (props) => <IconBase {...props}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></IconBase>;

        const INITIAL_STAFF_DATA = [
            { id: '1', name: '邱素芳', role: '综合管理', tasks: ['A5（科室工作计划与总结）', 'A2（院外文件）', 'A3（院内文件）'] },
            { id: '2', name: '余俏娟', role: '内审员', tasks: ['每年多学科联合演练计划', '科室PDCA计划', '科室间交叉质控', 'A1（科室简介等）', 'A6（检查及整改）', '每年培训计划', '产科质量检查资料管理', 'A4（门诊制度流程）', 'A10（应急预案-门诊）', 'A7手术授权及考核资料', '医疗技术台帐管理', '门诊病例质控'] },
            { id: '3', name: '余俏娟', role: '教秘', tasks: ['A11（科教）', 'B21（新入职培训、转岗培训）', '安排培训时间及检查', '科室模型管理', '人员论文科研资料管理'] },
            { id: '4', name: '梁金燕', role: '质控/医保', tasks: ['B9（危重症评审）', 'PPT质控', 'B14（病历质控）', '科室医保管理'] },
            { id: '5', name: '文姣平', role: '医疗质量', tasks: ['B1（医疗质量协助）', '不达标数据反馈', 'B3（重点疾病）', '质控其他科病例10份'] },
            { id: '6', name: '叶萍妃', role: '病房/急诊', tasks: ['A10（应急预案-病房）', '管理晨会记录及查房照片', 'B13（急诊统计表及质控表）', '急诊分诊检诊资料分析'] },
            { id: '7', name: '何小丹', role: '院感/统计', tasks: ['院感资料', 'B5（单病种）', 'B7医疗技术统计表及总结', '剖宫产质量分析'] },
            { id: '8', name: '刘艳琴', role: '临床/产房', tasks: ['B4（临床路径）', 'B11（疑难危重抢救）', 'B16（输血用药）', '交班本管理', '产房质量分析PPT'] },
            { id: '9', name: '王金玉', role: '随访/转介', tasks: ['B15（每月统计出院随访）', '高血压病人管理', 'B2（非计划再手术等）', 'B10（会诊、转介）'] },
            { id: '10', name: '余建梅', role: '分析/排班', tasks: ['B10（接转诊登记）', 'B1中转剖、产后出血等分析', 'A7（外出学习培训登记）', '急诊剖宫产/DDI统计表', '病房及急诊、120排班'] },
            { id: '11', name: '李敏', role: '纠纷/专科', tasks: ['纠纷分析', '糖尿病病人管理及随访', 'B14（病历质控及申诉）'] },
            { id: '12', name: '肖遥', role: '指南/培训', tasks: ['A4指南、制度流程更新', 'A9危重孕产妇抢救教案', '完善培训资料', '教学拍照协助'] },
            { id: '13', name: '潘丽红', role: '下乡/门诊', tasks: ['下乡资料管理', '早孕门诊资料管理', '汇总全科数据'] },
            { id: '14', name: '韩子旭', role: '文员', tasks: ['B8（完善个人档案）', '收集继续教育证书', 'B19（各项培训）', 'A8（会议记录）', '每月15日前排版打印'] }
        ];

        const MONTHS = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

        function App() {
            const [currentMonth, setCurrentMonth] = useState(new Date().getMonth());
            const [filterUncompleted, setFilterUncompleted] = useState(false);
            const [taskStatus, setTaskStatus] = useState(null);
            const [syncStatus, setSyncStatus] = useState('connecting');
            const [configError, setConfigError] = useState(!window.isFirebaseReady);

            useEffect(() => {
                if (!window.isFirebaseReady) {
                    setConfigError(true);
                    return;
                }
                
                const docRef = window.doc(window.db, 'artifacts', window.appId, 'public', 'main_data');
                
                const unsubscribe = window.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setTaskStatus(docSnap.data());
                        setSyncStatus('synced');
                    } else {
                        const initialState = {};
                        MONTHS.forEach((_, mIdx) => {
                            initialState[mIdx] = {};
                            INITIAL_STAFF_DATA.forEach(staff => {
                                initialState[mIdx][staff.id] = {};
                                staff.tasks.forEach((_, tIdx) => {
                                    initialState[mIdx][staff.id][tIdx] = false;
                                });
                            });
                        });
                        window.setDoc(docRef, initialState);
                    }
                }, (error) => {
                    console.error("Firestore error:", error);
                    setSyncStatus('error');
                });

                return () => unsubscribe();
            }, []);

            const toggleTask = async (staffId, taskIndex) => {
                const currentVal = taskStatus[currentMonth][staffId][taskIndex];
                const newState = {
                    ...taskStatus,
                    [currentMonth]: {
                        ...taskStatus[currentMonth],
                        [staffId]: { ...taskStatus[currentMonth][staffId], [taskIndex]: !currentVal }
                    }
                };
                
                setTaskStatus(newState);
                setSyncStatus('connecting');
                try {
                    await window.setDoc(window.doc(window.db, 'artifacts', window.appId, 'public', 'main_data'), newState);
                    setSyncStatus('synced');
                } catch {
                    setSyncStatus('error');
                }
            };

            const currentMonthData = useMemo(() => {
                if (!taskStatus) return { staffList: [], globalProgress: 0 };
                let completedCount = 0, totalCount = 0;

                const staffList = INITIAL_STAFF_DATA.map(staff => {
                    const staffTasks = staff.tasks.map((desc, tIdx) => {
                        const completed = taskStatus[currentMonth]?.[staff.id]?.[tIdx] || false;
                        totalCount++;
                        if (completed) completedCount++;
                        return { desc, completed, index: tIdx };
                    });

                    const uncompleted = staffTasks.filter(t => !t.completed);
                    return {
                        ...staff,
                        displayTasks: filterUncompleted ? uncompleted : staffTasks,
                        isCompleted: uncompleted.length === 0,
                        progress: Math.round(((staff.tasks.length - uncompleted.length) / staff.tasks.length) * 100)
                    };
                }).filter(s => !filterUncompleted || !s.isCompleted);

                return { staffList, globalProgress: totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0 };
            }, [currentMonth, filterUncompleted, taskStatus]);

            if (configError) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <CloudOff size={48} className="text-red-500 mb-4" />
                    <h2 className="text-2xl font-bold mb-2">未检测到云端配置</h2>
                    <p className="text-gray-600 max-w-md">
                        请用记事本打开 index.html 文件，并在第 31 行填入你从 Firebase Console 获取的真实配置信息。
                    </p>
                </div>
            );

            if (!taskStatus) return (
                <div className="min-h-screen flex flex-col items-center justify-center">
                    <div className="w-8 h-8 border-4 border-[#0071E3] border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-gray-500">正在同步科室任务数据...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <nav className="sticky top-0 z-50 bg-[#F5F5F7]/80 backdrop-blur-md border-b border-[#E5E5EA] px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <ListTodo className="text-black w-6 h-6" />
                                <span className="text-xl font-bold tracking-tight">TaskFlow 2026</span>
                                <div className="ml-4 flex items-center px-2 py-1 bg-white border border-gray-200 rounded-full text-[11px] font-bold">
                                    <Cloud className={`w-3 h-3 mr-1 ${syncStatus === 'synced' ? 'text-green-500' : 'text-blue-500 animate-pulse'}`} />
                                    {syncStatus === 'synced' ? '在线' : syncStatus === 'error' ? '离线' : '同步中'}
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 mt-12">
                        <div className="mb-10 text-center">
                            <h2 className="text-4xl font-extrabold mb-2">科室任务监控看板</h2>
                            <p className="text-gray-500">每月15日前需完成各自资料，与绩效挂钩</p>
                        </div>

                        <div className="bg-white p-4 rounded-3xl shadow-sm mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex gap-2 overflow-x-auto w-full hide-scrollbar">
                                {MONTHS.map((m, i) => (
                                    <button
                                        key={m}
                                        onClick={() => setCurrentMonth(i)}
                                        className={`px-4 py-2 rounded-full text-sm font-bold shrink-0 transition-all ${currentMonth === i ? 'bg-black text-white' : 'bg-gray-100 text-gray-600'}`}
                                    >
                                        {m}
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-4 shrink-0">
                                <div className="flex flex-col text-right">
                                    <span className="text-[10px] font-bold text-gray-400 uppercase">当前月进度</span>
                                    <span className="text-xl font-black text-blue-600">{currentMonthData.globalProgress}%</span>
                                </div>
                                <button
                                    onClick={() => setFilterUncompleted(!filterUncompleted)}
                                    className={`px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2 ${filterUncompleted ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-800'}`}
                                >
                                    <Filter size={14}/> {filterUncompleted ? '待办视图' : '全部视图'}
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {currentMonthData.staffList.map(staff => (
                                <div key={staff.id} className="bg-white p-6 rounded-[32px] shadow-sm border border-gray-50 flex flex-col h-[400px]">
                                    <div className="flex justify-between items-start mb-4 pb-4 border-b border-gray-50">
                                        <div>
                                            <h3 className="font-bold text-lg">{staff.name}</h3>
                                            <p className="text-xs text-gray-400 font-bold">{staff.role}</p>
                                        </div>
                                        <div className={`text-[10px] font-black px-2 py-1 rounded-full ${staff.isCompleted ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}`}>
                                            {staff.progress}%
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-2 custom-scrollbar">
                                        {staff.displayTasks.map(t => (
                                            <div 
                                                key={t.index} 
                                                onClick={() => toggleTask(staff.id, t.index)}
                                                className={`p-3 rounded-2xl flex items-start gap-3 cursor-pointer transition-all ${t.completed ? 'bg-gray-50 opacity-60' : 'bg-white border border-gray-100 hover:border-blue-400 shadow-sm hover:shadow-md'}`}
                                            >
                                                {t.completed ? <CheckCircle2 className="text-green-500 w-5 h-5 shrink-0" /> : <Circle className="text-gray-300 w-5 h-5 shrink-0" />}
                                                <span className={`text-[13px] font-medium leading-tight ${t.completed ? 'text-gray-400 line-through' : 'text-black'}`}>{t.desc}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
